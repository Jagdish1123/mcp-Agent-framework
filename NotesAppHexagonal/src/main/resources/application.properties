# -----------------------
# APPLICATION CONFIG
# -----------------------
spring.application.name=notes-app-hexagonal

# -----------------------
# DATABASE CONFIG
# -----------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/notes_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=your_db_username
spring.datasource.password=your_db_password

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# -----------------------
# AI / GEMINI MODEL CONFIG
# -----------------------
# Use environment variable for API key
app.gemini.api-key=${GEMINI_API_KEY}

app.gemini.model=gemini-2.5-flash
app.gemini.temperature=0.3
app.gemini.max-output-tokens=512